name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install & build frontend
        run: |
          npm install --prefix frontend
          npm run build --prefix frontend

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy backend files
        run: |
          rsync -avz --delete \
            --exclude node_modules \
            --exclude prisma/dev.db \
            --exclude .env \
            --exclude uploads \
            -e "ssh -p ${{ secrets.SSH_PORT || '22' }}" \
            ./backend/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/urbanmotion-ai/backend/

      - name: Deploy frontend build
        run: |
          rsync -avz --delete \
            -e "ssh -p ${{ secrets.SSH_PORT || '22' }}" \
            ./frontend/dist/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/urbanmotion-ai/frontend/dist/

      - name: Deploy ecosystem.config.cjs
        run: |
          rsync -avz \
            -e "ssh -p ${{ secrets.SSH_PORT || '22' }}" \
            ./ecosystem.config.cjs \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/urbanmotion-ai/ecosystem.config.cjs

      - name: Install backend deps & restart
        run: |
          ssh -p ${{ secrets.SSH_PORT || '22' }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            set -e
            cd /var/www/urbanmotion-ai/backend
            npm install --omit=dev
            npx prisma generate
            npx prisma migrate deploy 2>/dev/null || npx prisma db push
            cd /var/www/urbanmotion-ai
            pm2 restart ecosystem.config.cjs || pm2 start ecosystem.config.cjs
            pm2 save
          EOF

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/id_ed25519
