<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stb_Chatbot - AI Chat</title>
  <meta name="description" content="Stb_Chatbot - AI Chat Assistant berbasis kecerdasan buatan.">

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x1f916;</text></svg>">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <i class="fas fa-robot logo-icon"></i>
        <span class="logo-text">Stb_</span><span class="logo-highlight">Chatbot</span>
      </div>
      <button class="btn-new-chat" id="newChatBtn">
        <i class="fas fa-plus"></i> New Chat
      </button>
    </div>

    <div class="sidebar-history" id="chatHistory">
      <div class="history-item active" data-id="default">
        <i class="fas fa-comment-dots"></i>
        <span>Chat Pertama</span>
      </div>
    </div>

    <div class="sidebar-footer">
      <div class="sidebar-user">
        <i class="fas fa-user-circle"></i>
        <span>Pengguna Stb_Chatbot</span>
      </div>
    </div>
  </aside>

  <!-- SIDEBAR TOGGLE (mobile) -->
  <button class="sidebar-toggle" id="sidebarToggle">
    <i class="fas fa-bars"></i>
  </button>

  <!-- MAIN -->
  <main class="main-content" id="mainContent">
    <div class="chat-container" id="chatContainer">
      <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-logo">
          <i class="fas fa-robot"></i>
        </div>
        <h1 class="welcome-title">Selamat datang di <span class="gradient-text">Stb_Chatbot</span></h1>
        <p class="welcome-subtitle">AI Assistant cerdas siap membantu Anda dengan berbagai pertanyaan, coding, menulis, dan banyak lagi.</p>

        <div class="suggestion-chips" id="suggestionChips">
          <button class="chip" data-prompt="Jelaskan apa itu AI dan bagaimana cara kerjanya">
            <i class="fas fa-brain"></i> Apa itu AI?
          </button>
          <button class="chip" data-prompt="Buatkan contoh kode Python untuk web scraping">
            <i class="fas fa-code"></i> Contoh Python
          </button>
          <button class="chip" data-prompt="Bantu saya menulis email profesional untuk klien">
            <i class="fas fa-envelope"></i> Email Profesional
          </button>
          <button class="chip" data-prompt="Tips produktivitas untuk developer">
            <i class="fas fa-rocket"></i> Tips Produktivitas
          </button>
          <button class="chip" data-prompt="Jelaskan perbedaan REST API dan GraphQL">
            <i class="fas fa-network-wired"></i> REST vs GraphQL
          </button>
          <button class="chip" data-prompt="Buatkan struktur database untuk e-commerce">
            <i class="fas fa-database"></i> Database E-Commerce
          </button>
        </div>
      </div>

      <div class="messages-area" id="messagesArea"></div>
    </div>

    <!-- INPUT -->
    <div class="input-area">
      <div class="input-wrapper">
        <textarea class="chat-input" id="chatInput" placeholder="Tanyakan sesuatu pada Stb_Chatbot..." rows="1"></textarea>
        <button class="btn-send" id="sendBtn">
          <i class="fas fa-arrow-up"></i>
        </button>
      </div>
      <p class="input-footer">Stb_Chatbot dapat melakukan kesalahan. Gunakan dengan bijak.</p>
    </div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
